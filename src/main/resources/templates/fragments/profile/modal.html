<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal"
     class="fixed inset-0 bg-black/40 z-[100] flex items-center justify-center"
     onclick="closeModal()">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-[420px] p-6"
       onclick="event.stopPropagation()">

    <!-- Header -->
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-[16px] font-medium text-[#1a1a1a]">Dados cadastrais</h2>
      <button type="button" onclick="closeModal()"
              class="w-7 h-7 flex items-center justify-center text-[#888] hover:text-[#1a1a1a] rounded-md transition-colors">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Form -->
    <form hx-put="/profile"
          hx-target="#modal-container"
          hx-swap="innerHTML"
          class="flex flex-col gap-4">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="flex flex-col gap-1.5">
        <label class="text-[13px] font-medium text-[#1a1a1a]">E-mail</label>
        <input type="email" disabled th:value="${user.username}"
               class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md bg-[#f5f5f5] text-[#888] cursor-not-allowed"/>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="profile-name" class="text-[13px] font-medium text-[#1a1a1a]">Nome</label>
        <input id="profile-name" name="name" type="text" required
               th:value="${user.name}"
               placeholder="Seu nome"
               class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] transition-colors"/>
      </div>

      <div class="flex justify-end gap-2 mt-1">
        <button type="button" onclick="closeModal()"
                class="px-4 py-[9px] text-[13px] text-[#888] border border-[#e0e0e0] rounded-md hover:bg-[#f5f5f5] transition-colors">
          Cancelar
        </button>
        <button type="submit"
                class="px-4 py-[9px] text-[13px] font-medium bg-[#1D9E75] text-white rounded-md hover:opacity-90 transition-opacity">
          Salvar
        </button>
      </div>
    </form>

  </div>
</div>

</body>
</html>
