<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

    <div th:fragment="modal" class="fixed inset-0 bg-black/40 z-[100] flex items-center justify-center"
        onclick="closeModal()">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-[780px] h-[700px] flex flex-col"
            onclick="event.stopPropagation()">
            <!-- Header -->
            <div class="flex-shrink-0 flex items-center justify-between px-5 pt-4 pb-4 border-b border-[#e5e7eb]">
                <div>
                    <p class="text-[11px] text-[#888] uppercase tracking-wide font-medium">DID</p>
                    <h2 class="text-[18px] font-medium text-[#1a1a1a] font-mono mt-0.5" th:text="${did != null ?
              (did.number != null and did.number.length() == 10 ?
                '(' + #strings.substring(did.number,0,2) + ') ' + #strings.substring(did.number,2,6) + '-' + #strings.substring(did.number,6,10)
                : did.number)
              : 'Novo DID'}">DID</h2>
                </div>
                <button type="button" onclick="closeModal()"
                    class="w-7 h-7 flex items-center justify-center text-[#888] hover:text-[#1a1a1a] rounded-md transition-colors">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>

            <!-- Painel criação -->
            <form th:if="${did == null}" hx-post="/dids" hx-target="#modal-container" hx-swap="innerHTML"
                class="flex flex-col flex-1 min-h-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="flex-1 overflow-y-auto p-5 flex flex-col gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-[13px] font-medium text-[#1a1a1a]">Número do DID <span
                                class="text-[#E24B4A]">*</span></label>
                        <input id="did-display" type="text" maxlength="15" required placeholder="(XX) XXXX-XXXX"
                            class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] transition-colors font-mono tracking-widest" />
                        <input id="did-digits" name="number" type="hidden" />
                        <p class="text-[11px] text-[#aaa]">Formato: (XX) XXXX-XXXX — apenas dígitos são armazenados</p>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" onclick="closeModal()" class="btn-modal-cancel">Cancelar</button>
                    <button type="submit" class="btn-modal-save">Salvar</button>
                </div>
            </form>

            <!-- Painel visualização (DID existente) -->
            <div th:if="${did != null}" class="flex flex-col flex-1 min-h-0">

                <div class="flex-1 overflow-y-auto p-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <p class="text-[11px] font-medium text-[#888] uppercase tracking-wide mb-1">Número</p>
                            <p class="font-mono text-[20px] font-medium text-[#1a1a1a]" th:text="${did.number != null and did.number.length() == 10 ?
               '(' + #strings.substring(did.number,0,2) + ') ' + #strings.substring(did.number,2,6) + '-' + #strings.substring(did.number,6,10)
               : did.number}">—</p>
                        </div>
                        <div>
                            <p class="text-[11px] font-medium text-[#888] uppercase tracking-wide mb-1">Status</p>
                            <div class="mt-1">
                                <span th:if="${did.circuit != null}"
                                    class="bg-[#E1F5EE] text-[#085041] rounded-[99px] text-[12px] px-[9px] py-[2px] font-medium">Vinculado</span>
                                <span th:if="${did.circuit == null}"
                                    class="bg-[#E6F1FB] text-[#0C447C] rounded-[99px] text-[12px] px-[9px] py-[2px] font-medium">Livre</span>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4">
                        <p class="text-[11px] font-medium text-[#888] uppercase tracking-wide mb-1">Circuito vinculado
                        </p>
                        <p class="font-mono text-[13px] text-[#1a1a1a] mt-1"
                            th:text="${did.circuitNumber != null ? did.circuitNumber : '—'}">—</p>
                    </div>
                </div>

                <div class="modal-footer">
                    <div th:if="${did.circuit == null}" class="contents">
                        <div th:replace="~{fragments/confirm-delete :: confirm-delete(
              deleteUrl=${'/dids/' + did.id},
              hxTarget='#table-container',
              hxInclude='.did-filter',
              label=${'o DID ' + did.number})}">
                        </div>
                    </div>
                    <button type="button" onclick="closeModal()" class="btn-modal-cancel">Cancelar</button>
                </div>
            </div>

        </div>
        <!-- OOB: toast -->
        <th:block th:if="${toastMsg}">
            <div th:replace="~{fragments/toast :: toast(toastMessage=${toastMsg}, toastType=${toastType})}"></div>
        </th:block>

        <!-- Trigger: recarrega tabela após criação -->
        <div th:if="${refreshTable}"
             hx-get="/dids/table"
             hx-target="#table-container"
             hx-swap="innerHTML"
             hx-trigger="load"
             class="hidden"></div>

        <script>
            (function () {
                var display = document.getElementById('did-display');
                var digits  = document.getElementById('did-digits');
                if (!display || !digits) return;

                display.addEventListener('input', function () {
                    var d = this.value.replace(/\D/g, '').substring(0, 10);
                    var f = '';
                    if (d.length > 0) f = '(' + d.substring(0, 2);
                    if (d.length >= 2) f += ') ';
                    if (d.length > 2) f += d.substring(2, 6);
                    if (d.length > 6) f += '-' + d.substring(6, 10);
                    this.value = f;
                    digits.value = d;
                });

                display.closest('form')?.addEventListener('submit', function () {
                    digits.value = display.value.replace(/\D/g, '');
                });
            })();
        </script>
    </div>


</body>

</html>
