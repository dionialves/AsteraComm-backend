<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      lang="pt-BR">
<head>
  <title>Planos</title>
</head>
<body>
<div layout:fragment="content">

  <!-- ── Cabeçalho ─────────────────────────────────────────────────────────── -->
  <div class="flex items-start justify-between mb-5">
    <div>
      <h1 class="text-[22px] font-medium text-[#1a1a1a]">Planos</h1>
      <p class="text-[13px] text-[#888] mt-0.5">Franquias de minutos e tarifação por destino</p>
    </div>
    <button class="flex items-center gap-1.5 bg-[#1D9E75] text-white text-[13px] font-medium px-3 py-[9px] rounded-md hover:opacity-90 transition-opacity"
            hx-get="/plans/modal/new"
            hx-target="#modal-container"
            hx-swap="innerHTML">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Novo Plano
    </button>
  </div>

  <!-- ── Toolbar ───────────────────────────────────────────────────────────── -->
  <div class="flex items-center justify-between mb-3 gap-3 flex-wrap">
    <div class="flex items-center gap-3">
      <div class="relative w-[280px]">
        <svg class="absolute left-[10px] top-1/2 -translate-y-1/2 text-[#aaa] pointer-events-none"
             width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" name="search" placeholder="Buscar por nome..."
               class="plan-filter w-full pl-[34px] pr-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] bg-white transition-colors"
               hx-get="/plans/table"
               hx-trigger="keyup changed delay:300ms"
               hx-target="#table-container"
               hx-swap="innerHTML"
               hx-include=".plan-filter"/>
      </div>
      <!-- Filtro status -->
      <div class="flex border border-[#e0e0e0] rounded-md overflow-hidden text-[13px]">
        <button id="filter-all"
                class="px-3 py-[7px] bg-white text-[#1a1a1a] font-medium border-r border-[#e0e0e0]"
                onclick="setActiveFilter(this, null)">Todos</button>
        <button id="filter-active"
                class="px-3 py-[7px] text-[#888] border-r border-[#e0e0e0]"
                onclick="setActiveFilter(this, 'true')">Ativos</button>
        <button id="filter-inactive"
                class="px-3 py-[7px] text-[#888]"
                onclick="setActiveFilter(this, 'false')">Inativos</button>
      </div>
    </div>
    <!-- Slot de paginação: preenchido via OOB a cada swap do fragment -->
    <div id="pagination-toolbar" class="flex items-center gap-2"></div>
  </div>

  <!-- ── Tabela container ──────────────────────────────────────────────────── -->
  <div id="table-container"
       hx-get="/plans/table"
       hx-trigger="load"
       hx-swap="innerHTML">
  </div>

  <!-- ── Contador de registros ─────────────────────────────────────────────── -->
  <p id="plan-counter" class="text-[12px] text-[#888] text-right mt-3"></p>

  <script>
    var currentSortField = 'id';
    var currentSortDir   = 'asc';
    var currentActive    = null;

    var SORT_ASC  = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>';
    var SORT_DESC = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

    function updateSortIcons() {
      document.querySelectorAll('.sort-col[data-field]').forEach(function (el) {
        var existing = el.querySelector('svg');
        if (existing) existing.remove();
        if (el.dataset.field === currentSortField)
          el.insertAdjacentHTML('beforeend', currentSortDir === 'asc' ? SORT_ASC : SORT_DESC);
      });
    }

    function triggerTableLoad(page) {
      var search = (document.querySelector('input[name="search"].plan-filter') || {}).value || '';
      var params = 'sort=' + currentSortField + ',' + currentSortDir + '&page=' + page + '&size=20&search=' + encodeURIComponent(search);
      if (currentActive !== null) params += '&active=' + currentActive;
      htmx.ajax('GET', '/plans/table?' + params, {target: '#table-container', swap: 'innerHTML'});
    }

    function setActiveFilter(btn, active) {
      currentActive = active;
      document.querySelectorAll('[id^="filter-"]').forEach(function (b) {
        b.classList.remove('bg-white', 'text-[#1a1a1a]', 'font-medium');
        b.classList.add('text-[#888]');
      });
      btn.classList.add('bg-white', 'text-[#1a1a1a]', 'font-medium');
      btn.classList.remove('text-[#888]');
      triggerTableLoad(0);
    }

    document.addEventListener('htmx:afterSwap', function (e) {
      if (e.detail.target.id === 'table-container') {
        // Sincronizar sort do hidden input (servidor pode ter corrigido)
        var si = document.getElementById('current-sort');
        if (si) {
          var p = si.value.split(',');
          currentSortField = p[0];
          currentSortDir   = p[1] || 'asc';
        }
        updateSortIcons();

        // Click handlers nas colunas sortáveis
        document.querySelectorAll('.sort-col[data-field]').forEach(function (el) {
          el.addEventListener('click', function () {
            if (currentSortField === el.dataset.field) {
              currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc';
            } else {
              currentSortField = el.dataset.field;
              currentSortDir   = 'asc';
            }
            var si2 = document.getElementById('current-sort');
            if (si2) si2.value = currentSortField + ',' + currentSortDir;
            updateSortIcons();
            triggerTableLoad(0);
          });
        });

        // Click nas linhas para seleção
        document.querySelectorAll('.plan-row[data-id]').forEach(function (row) {
          row.addEventListener('click', function () {
            document.querySelectorAll('.plan-row.row-selected').forEach(function (r) { r.classList.remove('row-selected'); });
            row.classList.add('row-selected');
          });
        });
      }

      // Remover seleção quando modal fechar
      if (e.detail.target.id === 'modal-container' && !e.detail.target.innerHTML.trim()) {
        document.querySelectorAll('.plan-row.row-selected').forEach(function (r) { r.classList.remove('row-selected'); });
      }
    });
  </script>

</div>
</body>
</html>
