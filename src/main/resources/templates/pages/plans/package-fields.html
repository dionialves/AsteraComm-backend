<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="fields">

  <!-- NONE: sem campos adicionais -->
  <div th:if="${packageType?.name() == 'NONE'}"
       class="text-[13px] text-[#888] py-1">
    Sem pacote de minutos.
  </div>

  <!-- UNIFIED: total de minutos unificado -->
  <div th:if="${packageType?.name() == 'UNIFIED'}"
       class="flex flex-col gap-1.5">
    <label class="text-[13px] font-medium text-[#1a1a1a]">
      Total de minutos do pacote <span class="text-[#E24B4A]">*</span>
    </label>
    <input name="packageTotalMinutes" type="number" min="0" required
           th:value="${plan?.packageTotalMinutes}"
           placeholder="ex: 300"
           class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] transition-colors"/>
  </div>

  <!-- PER_CATEGORY: minutos por categoria -->
  <div th:if="${packageType?.name() == 'PER_CATEGORY'}"
       class="grid grid-cols-2 gap-3">
    <div class="flex flex-col gap-1.5">
      <label class="text-[13px] font-medium text-[#1a1a1a]">Fixo local</label>
      <input name="packageFixedLocal" type="number" min="0"
             th:value="${plan?.packageFixedLocal}"
             placeholder="minutos"
             class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] transition-colors"/>
    </div>
    <div class="flex flex-col gap-1.5">
      <label class="text-[13px] font-medium text-[#1a1a1a]">Fixo longa distância</label>
      <input name="packageFixedLongDistance" type="number" min="0"
             th:value="${plan?.packageFixedLongDistance}"
             placeholder="minutos"
             class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] transition-colors"/>
    </div>
    <div class="flex flex-col gap-1.5">
      <label class="text-[13px] font-medium text-[#1a1a1a]">Móvel local</label>
      <input name="packageMobileLocal" type="number" min="0"
             th:value="${plan?.packageMobileLocal}"
             placeholder="minutos"
             class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] transition-colors"/>
    </div>
    <div class="flex flex-col gap-1.5">
      <label class="text-[13px] font-medium text-[#1a1a1a]">Móvel longa distância</label>
      <input name="packageMobileLongDistance" type="number" min="0"
             th:value="${plan?.packageMobileLongDistance}"
             placeholder="minutos"
             class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] transition-colors"/>
    </div>
  </div>

</th:block>

</body>
</html>
