<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:fragment="modal" class="fixed inset-0 bg-black/40 z-[100] flex items-center justify-center"
     onclick="closeModal()">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-[780px] h-[700px] flex flex-col"
       onclick="event.stopPropagation()">

    <!-- Header -->
    <div class="flex-shrink-0 flex items-center justify-between px-5 pt-4 pb-4 border-b border-[#e5e7eb]">
      <div>
        <p class="text-[11px] text-[#888] uppercase tracking-wide font-medium">Cliente</p>
        <h2 class="text-[18px] font-medium text-[#1a1a1a] mt-0.5"
            th:text="${customer != null} ? ${customer.name} : 'Novo Cliente'">Cliente</h2>
      </div>
      <button type="button" onclick="closeModal()"
              class="w-7 h-7 flex items-center justify-center text-[#888] hover:text-[#1a1a1a] rounded-md transition-colors">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Tab bar (apenas em modo edição) -->
    <div th:if="${customer != null}"
         class="flex-shrink-0 flex border-b border-[#e5e7eb] px-5 gap-1">
      <button type="button" id="tab-btn-detalhes"
              class="px-3 py-[10px] text-[13px] font-medium text-[#1a1a1a] border-b-2 border-[#1D9E75] -mb-px">
        Detalhes
      </button>
      <button type="button" id="tab-btn-circuitos"
              class="px-3 py-[10px] text-[13px] text-[#888] hover:text-[#1a1a1a] border-b-2 border-transparent -mb-px transition-colors">
        Circuitos
      </button>
      <button type="button" id="tab-btn-historico"
              class="px-3 py-[10px] text-[13px] text-[#888] hover:text-[#1a1a1a] border-b-2 border-transparent -mb-px transition-colors">
        Histórico
      </button>
    </div>

    <!-- Form (body + footer) -->
    <form th:attr="hx-post=${customer == null ? '/customers' : null},
                  hx-put=${customer != null ? '/customers/' + customer.id : null},
                  hx-target='#modal-container'"
          hx-swap="innerHTML"
          class="flex flex-col flex-1 min-h-0">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <!-- Body com painéis de tabs -->
      <div class="flex-1 overflow-y-auto p-5">

        <!-- Tab: Detalhes -->
        <div id="tab-panel-detalhes" class="flex flex-col gap-4">

          <p class="text-[12px] font-semibold text-[#888] uppercase tracking-wide">Identificação</p>

          <div class="grid grid-cols-2 gap-3">
            <div class="flex flex-col gap-1.5">
              <label class="text-[13px] font-medium text-[#1a1a1a]">ID</label>
              <input type="text" th:value="${customer?.id}" disabled placeholder="—"
                     class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md bg-[#f5f5f5] text-[#888] font-mono outline-none"/>
            </div>
            <div class="flex flex-col gap-1.5">
              <label class="text-[13px] font-medium text-[#1a1a1a]">Nome <span class="text-[#E24B4A]">*</span></label>
              <input name="name" type="text" required th:value="${customer?.name}"
                     placeholder="Ex: Empresa XYZ"
                     class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] transition-colors"/>
            </div>
          </div>

          <div class="flex items-center gap-2">
            <label class="toggle-switch">
              <input id="field-enabled" name="enabled" value="true" type="checkbox"
                     th:checked="${customer == null or customer.enabled}"/>
              <span class="toggle-slider"></span>
            </label>
            <span id="toggle-enabled-label" class="toggle-label"
                  th:text="${customer != null and !customer.enabled} ? 'Inativo' : 'Ativo'">Ativo</span>
          </div>

          <hr class="border-t border-[#e5e7eb]"/>

          <p class="text-[12px] font-semibold text-[#888] uppercase tracking-wide">Informações</p>

          <div class="grid grid-cols-2 gap-3">
            <div class="flex flex-col gap-1.5">
              <label class="text-[13px] font-medium text-[#888]">Criado em</label>
              <input type="text" disabled placeholder="—"
                     th:value="${customer != null ? #temporals.format(customer.createdAt, 'dd/MM/yyyy HH:mm') : ''}"
                     class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md bg-[#f5f5f5] text-[#888] outline-none"/>
            </div>
            <div class="flex flex-col gap-1.5">
              <label class="text-[13px] font-medium text-[#888]">Atualizado em</label>
              <input type="text" disabled placeholder="—"
                     th:value="${customer != null ? #temporals.format(customer.updatedAt, 'dd/MM/yyyy HH:mm') : ''}"
                     class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md bg-[#f5f5f5] text-[#888] outline-none"/>
            </div>
          </div>

        </div>

        <!-- Tab: Circuitos (apenas em modo edição) -->
        <div id="tab-panel-circuitos" class="hidden" th:if="${customer != null}">
          <div th:replace="~{pages/customers/tab-circuits :: circuits(circuits=${circuits})}"></div>
        </div>

        <!-- Tab: Histórico (apenas em modo edição) -->
        <div id="tab-panel-historico" class="hidden" th:if="${customer != null}">
          <div th:replace="~{pages/customers/tab-history :: history}"></div>
        </div>

      </div>

      <!-- Footer -->
      <div class="modal-footer">
        <div th:if="${customer != null}" class="contents">
          <div th:replace="~{fragments/confirm-delete :: confirm-delete(
              deleteUrl=${'/customers/' + customer.id},
              hxTarget='#modal-container',
              hxInclude='.customer-filter',
              label=${'o cliente ' + customer.name})}">
          </div>
        </div>
        <button type="button" onclick="closeModal()" class="btn-modal-cancel">Cancelar</button>
        <button type="submit" class="btn-modal-save">Salvar</button>
      </div>
    </form>

  </div>

  <!-- OOB: toast -->
  <th:block th:if="${toastMsg}">
    <div th:replace="~{fragments/toast :: toast(toastMessage=${toastMsg}, toastType=${toastType})}"></div>
  </th:block>

  <!-- Trigger: recarrega tabela após criação -->
  <div th:if="${refreshTable}"
       hx-get="/customers/table"
       hx-target="#table-container"
       hx-swap="innerHTML"
       hx-trigger="load"
       class="hidden"></div>

  <script>
    (function () {
      // ── Tabs ────────────────────────────────────────────────────────────────
      var tabs = ['detalhes', 'circuitos', 'historico'];

      function switchCustomerTab(tabId) {
        tabs.forEach(function (t) {
          var panel = document.getElementById('tab-panel-' + t);
          var btn   = document.getElementById('tab-btn-' + t);
          if (!panel || !btn) return;
          if (t === tabId) {
            panel.classList.remove('hidden');
            btn.classList.add('text-[#1a1a1a]', 'font-medium', 'border-[#1D9E75]');
            btn.classList.remove('text-[#888]', 'border-transparent');
          } else {
            panel.classList.add('hidden');
            btn.classList.remove('text-[#1a1a1a]', 'font-medium', 'border-[#1D9E75]');
            btn.classList.add('text-[#888]', 'border-transparent');
          }
        });
      }

      tabs.forEach(function (t) {
        var btn = document.getElementById('tab-btn-' + t);
        if (btn) btn.addEventListener('click', function () { switchCustomerTab(t); });
      });

      // ── Toggle ativo ─────────────────────────────────────────────────────────
      var chk = document.getElementById('field-enabled');
      var lbl = document.getElementById('toggle-enabled-label');
      if (chk && lbl) {
        chk.addEventListener('change', function () {
          lbl.textContent = chk.checked ? 'Ativo' : 'Inativo';
        });
      }
    })();
  </script>
</div>

</body>
</html>
