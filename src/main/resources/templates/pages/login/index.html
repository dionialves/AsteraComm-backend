<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base-login}"
      lang="pt-BR">
<head>
  <title>Login</title>
</head>
<body>
<div layout:fragment="content">
  <div class="w-full max-w-[380px] px-4">

    <div class="text-center mb-8">
      <span class="text-[28px] font-medium tracking-[-0.5px]">
        <span class="text-[#1D9E75]">Astera</span><span class="text-[#1a1a1a]">Comm</span>
      </span>
      <p class="text-[13px] text-[#888] mt-1">Gerenciamento de PABX</p>
    </div>

    <div th:if="${param.error}"
         class="mb-4 px-4 py-3 bg-[#fef2f2] border border-[#fecaca] rounded-md text-[13px] text-[#dc2626]">
      Usuário ou senha inválidos.
    </div>

    <form th:action="@{/login}" method="post"
          class="bg-white rounded-xl border border-[#e0e0e0] p-6 flex flex-col gap-4">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="flex flex-col gap-1.5">
        <label for="username" class="text-[13px] font-medium text-[#1a1a1a]">E-mail</label>
        <input id="username" name="username" type="email" autocomplete="username"
               placeholder="seu@email.com"
               class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] transition-colors"/>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="password" class="text-[13px] font-medium text-[#1a1a1a]">Senha</label>
        <input id="password" name="password" type="password" autocomplete="current-password"
               placeholder="••••••••"
               class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] transition-colors"/>
      </div>

      <button type="submit"
              class="w-full bg-[#1D9E75] text-white text-[14px] font-medium py-[10px] rounded-md hover:opacity-90 transition-opacity mt-1">
        Entrar
      </button>
    </form>
  </div>
</div>
</body>
</html>
