<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/base}" lang="pt-BR">

<head>
    <title>Circuitos</title>
</head>

<body>
    <div layout:fragment="content">

        <!-- ── Cabeçalho ─────────────────────────────────────────────────────────── -->
        <div class="flex items-start justify-between mb-5">
            <div>
                <h1 class="text-[22px] font-medium text-[#1a1a1a]">Circuitos</h1>
                <p class="text-[13px] text-[#888] mt-0.5">Gerenciamento de circuitos SIP ativos</p>
            </div>
            <button
                class="flex items-center gap-1.5 bg-[#1D9E75] text-white text-[13px] font-medium px-3 py-[9px] rounded-md hover:opacity-90 transition-opacity"
                hx-get="/circuits/modal/new" hx-target="#modal-container" hx-swap="innerHTML">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                Novo circuito
            </button>
        </div>

        <!-- ── Toolbar ───────────────────────────────────────────────────────────── -->
        <div class="flex items-center justify-between mb-3 gap-3 flex-wrap">
            <div class="flex items-center gap-3">
                <!-- Busca -->
                <div class="relative w-[280px]">
                    <svg class="absolute left-[10px] top-1/2 -translate-y-1/2 text-[#aaa] pointer-events-none"
                        width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" name="search" placeholder="Buscar por código, cliente, IP..."
                        class="circuit-filter w-full pl-[34px] pr-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] bg-white transition-colors"
                        id="search-input" oninput="handleSearchInput()" />
                </div>
                <!-- Filtro combinado -->
                <div class="flex border border-[#e0e0e0] rounded-md overflow-hidden text-[13px]">
                    <button type="button" id="filter-all"
                        class="px-3 py-[7px] bg-white text-[#1a1a1a] font-medium border-r border-[#e0e0e0]"
                        onclick="setFilter(this, '')">Todos</button>
                    <button type="button" id="filter-online" class="px-3 py-[7px] text-[#888] border-r border-[#e0e0e0]"
                        onclick="setFilter(this, 'online')">Online</button>
                    <button type="button" id="filter-offline"
                        class="px-3 py-[7px] text-[#888] border-r border-[#e0e0e0]"
                        onclick="setFilter(this, 'offline')">Offline</button>
                    <button type="button" id="filter-inactive" class="px-3 py-[7px] text-[#888]"
                        onclick="setFilter(this, 'inactive')">Inativos</button>
                </div>
            </div>
            <!-- Paginação (populada via OOB swap pelo table fragment) -->
            <div id="pagination-toolbar" class="flex items-center gap-2"></div>
        </div>

        <!-- ── Tabela container ──────────────────────────────────────────────────── -->
        <div id="table-container" hx-get="/circuits/table" hx-trigger="load" hx-swap="innerHTML">
        </div>

        <!-- ── Contador de registros ─────────────────────────────────────────────── -->
        <p id="circuit-counter" class="text-[12px] text-[#888] text-right mt-3"></p>

        <script>
            // ── Sort + filter state ────────────────────────────────────────────────────
            var currentSortField = 'number';
            var currentSortDir = 'asc';
            var currentFilter = '';
            var searchTimer = null;

            var SORT_ASC = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>';
            var SORT_DESC = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

            function updateSortIcons() {
                document.querySelectorAll('.sort-col[data-field]').forEach(function (el) {
                    var existing = el.querySelector('svg');
                    if (existing) existing.remove();
                    if (el.dataset.field === currentSortField) {
                        el.insertAdjacentHTML('beforeend', currentSortDir === 'asc' ? SORT_ASC : SORT_DESC);
                    }
                });
            }

            function triggerTableLoad(page) {
                var search = (document.getElementById('search-input') || {}).value || '';
                var params = 'sort=' + currentSortField + ',' + currentSortDir
                    + '&page=' + page
                    + '&size=20'
                    + '&search=' + encodeURIComponent(search);
                if (currentFilter) params += '&filter=' + currentFilter;
                htmx.ajax('GET', '/circuits/table?' + params, {target: '#table-container', swap: 'innerHTML'});
            }

            function handleSearchInput() {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(function () {triggerTableLoad(0);}, 300);
            }

            function setFilter(btn, filter) {
                document.querySelectorAll('[id^="filter-"]').forEach(function (b) {
                    b.classList.remove('bg-white', 'text-[#1a1a1a]', 'font-medium');
                    b.classList.add('text-[#888]');
                });
                btn.classList.add('bg-white', 'text-[#1a1a1a]', 'font-medium');
                btn.classList.remove('text-[#888]');

                currentFilter = filter;

                triggerTableLoad(0);
            }

            document.addEventListener('htmx:afterSwap', function (e) {
                if (e.detail.target.id === 'table-container') {
                    // Sync state from hidden inputs
                    var si = document.getElementById('current-sort');
                    if (si) {
                        var parts = si.value.split(',');
                        currentSortField = parts[0] || 'number';
                        currentSortDir = parts[1] || 'asc';
                    }
                    var fi = document.getElementById('current-filter');
                    if (fi) {currentFilter = fi.value;}

                    updateSortIcons();

                    // Sort column click handlers
                    document.querySelectorAll('.sort-col[data-field]').forEach(function (el) {
                        el.addEventListener('click', function () {
                            var field = el.dataset.field;
                            if (currentSortField === field) {
                                currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc';
                            } else {
                                currentSortField = field;
                                currentSortDir = 'asc';
                            }
                            var si2 = document.getElementById('current-sort');
                            if (si2) si2.value = currentSortField + ',' + currentSortDir;
                            updateSortIcons();
                            triggerTableLoad(0);
                        });
                    });

                    // Row selection
                    document.querySelectorAll('.circuit-row[data-number]').forEach(function (row) {
                        row.addEventListener('click', function () {
                            document.querySelectorAll('.circuit-row.row-selected').forEach(function (r) {r.classList.remove('row-selected');});
                            row.classList.add('row-selected');
                        });
                    });
                }
                if (e.detail.target.id === 'modal-container' && !e.detail.target.innerHTML.trim()) {
                    document.querySelectorAll('.circuit-row.row-selected').forEach(function (r) {r.classList.remove('row-selected');});
                }
            });
        </script>

    </div>
</body>

</html>
