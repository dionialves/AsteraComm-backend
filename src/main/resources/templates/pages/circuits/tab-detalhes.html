<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="detalhes" class="flex flex-col gap-4">

  <!-- Seção: Identificação -->
  <p class="text-[12px] font-semibold text-[#888] uppercase tracking-wide">Identificação</p>

  <div class="grid grid-cols-2 gap-3">
    <!-- ID (somente edição) -->
    <div th:if="${circuit != null}" class="flex flex-col gap-1.5">
      <label class="text-[13px] font-medium text-[#888]">ID</label>
      <input type="text" th:value="${circuit.id}" disabled
             class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md bg-[#f5f5f5] text-[#888] font-mono outline-none"/>
    </div>
    <!-- Nome / Código (somente edição) -->
    <div th:if="${circuit != null}" class="flex flex-col gap-1.5">
      <label class="text-[13px] font-medium text-[#888]">Código</label>
      <input type="text" th:value="${circuit.number}" disabled
             class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md bg-[#f5f5f5] text-[#888] font-mono outline-none"/>
    </div>
  </div>

  <!-- Ativo (sempre visível) -->
  <div class="flex items-center gap-2">
    <label class="toggle-switch">
      <input id="field-active" name="active" value="true" type="checkbox"
             th:checked="${circuit == null or circuit.active}"/>
      <span class="toggle-slider"></span>
    </label>
    <span id="toggle-active-label" class="toggle-label"
          th:text="${circuit != null and !circuit.active} ? 'Inativo' : 'Ativo'">Ativo</span>
  </div>

  <hr class="border-t border-[#e5e7eb]"/>

  <!-- Seção: Autenticação -->
  <p class="text-[12px] font-semibold text-[#888] uppercase tracking-wide">Autenticação</p>

  <div class="flex flex-col gap-1.5">
    <label class="text-[13px] font-medium text-[#1a1a1a]">
      Senha <span class="text-[#E24B4A]">*</span>
    </label>
    <div class="relative">
      <input id="field-password" name="password" type="password" required
             th:value="${circuit?.password}"
             placeholder="Senha do ramal SIP"
             class="w-full px-3 py-[9px] pr-10 text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] transition-colors font-mono"/>
      <button type="button" id="btn-toggle-password"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-[#aaa] hover:text-[#1a1a1a] transition-colors">
        <svg id="icon-eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <svg id="icon-eye-closed" class="hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
    </div>
  </div>

  <hr class="border-t border-[#e5e7eb]"/>

  <!-- Seção: Configuração -->
  <p class="text-[12px] font-semibold text-[#888] uppercase tracking-wide">Configuração</p>

  <!-- Cliente — 50% da largura -->
  <div class="w-1/2 flex flex-col gap-1.5">
    <label class="text-[13px] font-medium text-[#1a1a1a]">
      Cliente <span class="text-[#E24B4A]">*</span>
    </label>
    <div th:replace="~{fragments/search-select :: search-select(
        fieldName='customerId',
        placeholder='Buscar cliente...',
        selectedId=${circuit?.customer?.id},
        selectedLabel=${circuit?.customer?.name})}">
    </div>
  </div>

  <!-- Plano + Tronco — lado a lado, cada um 50% -->
  <div class="flex gap-3">
    <div class="flex-1 flex flex-col gap-1.5">
      <label class="text-[13px] font-medium text-[#1a1a1a]">
        Plano <span class="text-[#E24B4A]">*</span>
      </label>
      <div th:replace="~{fragments/search-select :: search-select(
          fieldName='planId',
          placeholder='Buscar plano...',
          selectedId=${circuit?.plan?.id},
          selectedLabel=${circuit?.plan?.name})}">
      </div>
    </div>
    <div class="flex-1 flex flex-col gap-1.5">
      <label class="text-[13px] font-medium text-[#1a1a1a]">
        Tronco <span class="text-[#E24B4A]">*</span>
      </label>
      <div th:replace="~{fragments/search-select :: search-select(
          fieldName='trunkName',
          placeholder='Buscar tronco...',
          selectedId=${circuit?.trunkName},
          selectedLabel=${circuit?.trunkName})}">
      </div>
    </div>
  </div>

  <script>
    (function () {
      var passInput = document.getElementById('field-password');
      var btnToggle = document.getElementById('btn-toggle-password');
      var eyeOpen   = document.getElementById('icon-eye-open');
      var eyeClosed = document.getElementById('icon-eye-closed');
      if (btnToggle && passInput) {
        btnToggle.addEventListener('click', function () {
          var isPass = passInput.type === 'password';
          passInput.type = isPass ? 'text' : 'password';
          eyeOpen.classList.toggle('hidden', isPass);
          eyeClosed.classList.toggle('hidden', !isPass);
        });
      }

      var chk = document.getElementById('field-active');
      var lbl = document.getElementById('toggle-active-label');
      if (chk && lbl) {
        chk.addEventListener('change', function () {
          lbl.textContent = chk.checked ? 'Ativo' : 'Inativo';
        });
      }
    })();
  </script>
</div>

</body>
</html>
